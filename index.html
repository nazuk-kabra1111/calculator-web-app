<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>CALCULATOR</h2>
    <div class="content">
        <div class="calc">
            <div class="output">0</div>
            <div class="cln">
                <button class="btn op">AC</button>
                <button class="btn op">DEL</button>
                <button class="btn op oper1">%</button>
                <button class="btn func oper1">/</button>
                <button class="btn">7</button>
                <button class="btn">8</button>
                <button class="btn">9</button>
                <button class="btn func mult oper1">x</button>
                <button class="btn">4</button>
                <button class="btn">5</button>
                <button class="btn">6</button>
                <button class="btn func sub oper1">-</button>
                <button class="btn">1</button>
                <button class="btn">2</button>
                <button class="btn">3</button>
                <button class="btn func oper1">+</button>
                <button class="btn">00</button>
                <button class="btn">0</button>
                <button class="btn">.</button>
                <button class="btn func">=</button>
            </div>
        </div>
    </div>
    <script src="calc.js"></script>
</body>
</html>
